<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="levamps" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta charset="UTF-8" />
  <!-- <script>document.documentElement.lang=localStorage.getItem('site-lang')||'en'</script> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — VAMPS</title>
  <meta name="description" content="Proyectos seleccionados de diseño, branding y experiencias digitales." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/globals.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/work.css" />
  <link rel="stylesheet" href="/css/home.css" />
</head>
<body>

  <div class="page-transition"></div>

  <nav class="nav">
    <a href="/" class="nav__logo">Home</a>
    <div class="nav__links">
      <a href="/vamps/" class="nav__link">VAMPS</a>
      <a href="/ismael/" class="nav__link">Work</a>
      <!-- <button class="nav__lang" id="langToggle">ES</button> -->
    </div>
  </nav>

  <!-- Work Hero -->
  <section class="work-hero">
    <h1 class="work-hero__title" data-animate="fade-up">Selected Work</h1>
    <p class="work-hero__count" data-animate="fade-up">4 Proyectos</p>
  </section>

  <!-- Projects Grid -->
  <section class="work-grid">
    <div class="work-grid__inner" data-animate-group>

      <a href="/work/brand-identity-case/" class="project-card" data-animate="fade-up">
        <div class="project-card__image-wrapper">
          <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&q=80" alt="Brand Identity" class="project-card__image" loading="lazy" />
        </div>
        <div class="project-card__info">
          <div>
            <h3 class="project-card__title">Lumina Brand Identity</h3>
            <span class="project-card__category">Branding</span>
          </div>
          <span class="project-card__year">2025</span>
        </div>
      </a>

      <a href="/work/editorial-design/" class="project-card" data-animate="fade-up">
        <div class="project-card__image-wrapper">
          <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?w=800&q=80" alt="Editorial Design" class="project-card__image" loading="lazy" />
        </div>
        <div class="project-card__info">
          <div>
            <h3 class="project-card__title">Printed Matter Vol. III</h3>
            <span class="project-card__category">Editorial</span>
          </div>
          <span class="project-card__year">2025</span>
        </div>
      </a>

      <a href="/work/digital-experience/" class="project-card" data-animate="fade-up">
        <div class="project-card__image-wrapper">
          <img src="https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=800&q=80" alt="Digital Experience" class="project-card__image" loading="lazy" />
        </div>
        <div class="project-card__info">
          <div>
            <h3 class="project-card__title">Senso Digital Experience</h3>
            <span class="project-card__category">Web / Interactive</span>
          </div>
          <span class="project-card__year">2024</span>
        </div>
      </a>

      <a href="/work/visual-system/" class="project-card" data-animate="fade-up">
        <div class="project-card__image-wrapper">
          <img src="https://images.unsplash.com/photo-1634986666676-ec8fd927c23d?w=800&q=80" alt="Visual System" class="project-card__image" loading="lazy" />
        </div>
        <div class="project-card__info">
          <div>
            <h3 class="project-card__title">Aether Visual System</h3>
            <span class="project-card__category">Design System</span>
          </div>
          <span class="project-card__year">2024</span>
        </div>
      </a>

    </div>
  </section>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__left">
        <span class="footer__brand">VAMPS</span>
        <span class="footer__tagline">Design & Creative Direction</span>
      </div>
      <div class="footer__right">
        <a href="#" class="footer__social-link">Instagram</a>
        <a href="#" class="footer__social-link">Behance</a>
        <a href="#" class="footer__social-link">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
