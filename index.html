<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- <script>document.documentElement.lang=localStorage.getItem('site-lang')||'en'</script> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAMPS — Ismael Rivela Creative</title>
  <meta name="description" content="Diseño, dirección creativa y experiencias visuales." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/css/globals.css" />
  <link rel="stylesheet" href="/css/landing.css" />
</head>
<body>

  <div class="landing">

    <!-- Custom Cursor -->
    <div class="landing__cursor">
      <picture>
        <source srcset="/assets/landing/cursorvamps.webp" type="image/webp" />
        <img class="landing__cursor-img" src="/assets/landing/cursorvamps.jpg" alt="" />
      </picture>
    </div>

    <!-- Glyph Cursor (creative side) -->
    <div class="landing-glyph-cursor">
      <img class="landing-glyph-cursor__img" alt="" />
    </div>

    <!-- SVG Fluid Divider -->
    <svg class="landing__divider" preserveAspectRatio="none"></svg>

    <!-- Left: VAMPS -->
    <div class="landing__side landing__side--vamps">
      <div class="landing__content">
        <div class="landing__vamps-morph">
          <canvas class="landing__morph-canvas"></canvas>
        </div>
      </div>
    </div>

    <!-- Right: Ismael Rivela -->
    <div class="landing__side landing__side--ismael">
      <canvas class="landing__ascii"></canvas>
      <div class="landing__content">
        <div class="landing__image-wrapper">
          <picture>
            <source srcset="/assets/landing/ismael.webp" type="image/webp" />
            <img 
              src="/assets/landing/ismael.jpeg" 
              alt="Ismael Rivela" 
              class="landing__image"
              loading="lazy"
            />
          </picture>
        </div>
        <h2 class="landing__title-ismael">
          Ismael Rivela
          <span>Creative</span>
        </h2>
      </div>
    </div>

    <!-- Enter labels -->
    <div class="landing__enter landing__enter--vamps">vamps project</div>
    <div class="landing__enter landing__enter--ismael">work</div>

    <!-- Enter buttons -->
    <a href="/vamps/" class="landing__btn landing__btn--vamps">Enter</a>
    <a href="/ismael/" class="landing__btn landing__btn--ismael">Enter</a>

  </div>

  <script type="module" src="./js/landing.js"></script>
</body>
</html>
