<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAMPS — Back2School</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #fff;
      touch-action: pan-y;
    }

    /* ── Contenedor alto: define el rango de scroll ── */
    /* 6 imágenes → 7 × 100vh de altura total */
    #tunnel-scroll {
      height: 700vh;
      position: relative;
    }

    /* ── Sticky: se pega al viewport mientras dura el scroll ── */
    #tunnel-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      perspective: 600px;
      perspective-origin: 50% 50%;
    }

    @media (max-width: 768px) {
      #tunnel-sticky { perspective: 380px; }
      .slide img { width: min(92vw, 92vh); height: min(92vw, 92vh); }
    }

    /* ── Escenario 3D: se mueve entero (= cámara avanzando) ── */
    #world {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }
    /* ── Cover blanco que se quita cuando el logo aterriza ── */
    #tunnel-cover {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 1000;
      pointer-events: none;
    }

    /* ── Cada slide: centrada en el escenario ── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      will-change: transform, filter, opacity;
    }

    .slide img {
      width: min(85vw, 85vh);
      height: min(85vw, 85vh);
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ── Logos fijos ── */
    #logo-vamps {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      width: clamp(70px, 8vw, 110px);
      z-index: 999;
      cursor: pointer;
    }
    #logo-b2s {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: clamp(180px, 21vw, 300px);
      z-index: 999;
      display: block;
    }
    /* ── XP Loader ── */
    #xp-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #xp-logo {
      width: clamp(180px, 21vw, 300px);
      display: block;
      margin-bottom: 12px;
    }
    #xp-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #xp-loader-text {
      font-family: 'Trebuchet MS', Tahoma, sans-serif;
      font-size: 13px;
      color: #000;
      letter-spacing: 0.5px;
    }
    #xp-bar-outer {
      width: 220px;
      height: 16px;
      border: 1px solid #7a9fc7;
      background: #000f2b;
      border-radius: 3px;
      overflow: hidden;
      padding: 2px;
    }
    #xp-bar-track {
      display: flex;
      gap: 2px;
      height: 100%;
    }
    .xp-chunk {
      width: 12px;
      height: 100%;
      background: linear-gradient(to bottom, #4fa3e8 0%, #1e5fa8 40%, #2b7ad4 60%, #6ab0f0 100%);
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* ── Canvas Three.js al final del túnel ── */
    #b2s-three-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.6s ease;
    }
  </style>
</head>
<body>

  <a href="/vamps/"><img id="logo-vamps" src="/assets/vamps/back2school/b2s-logovamps.svg" alt="VAMPS" /></a>
  <img id="logo-b2s" src="/assets/vamps/back2school/b2s-logo.png" alt="Back2School" />

  <!-- XP Loader -->
  <div id="xp-loader">
    <img id="xp-logo" src="/assets/vamps/back2school/b2s-logo.png" alt="Back2School" />
    <div id="xp-bar-outer"><div id="xp-bar-track"></div></div>
    <div id="xp-loader-text">Loading...</div>
  </div>

  <div id="tunnel-cover"></div>
  <div id="tunnel-scroll">
    <div id="tunnel-sticky">
      <div id="world">
        <div class="slide"><img src="/assets/vamps/back2school/b2s-6.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-5.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-4.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-3.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-2.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-1.webp" /></div>
      </div>
      <canvas id="b2s-three-canvas"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <script>
    // XP loader — animates chunks, hides when all images load
    const loader   = document.getElementById('xp-loader')
    const track    = document.getElementById('xp-bar-track')
    const text     = document.getElementById('xp-loader-text')
    const imgs     = [...document.querySelectorAll('.slide img')]
    const CHUNKS   = 14
    let filled     = 0
    let animFrame

    // build chunks
    for (let i = 0; i < CHUNKS; i++) {
      const c = document.createElement('div')
      c.className = 'xp-chunk'
      c.style.opacity = '0'
      track.appendChild(c)
    }
    const chunks = [...track.querySelectorAll('.xp-chunk')]

    // marching animation — fills from left, loops
    let head = 0
    const VISIBLE = 5
    function march() {
      chunks.forEach((c, i) => {
        const rel = (i - head + CHUNKS) % CHUNKS
        c.style.opacity = rel < VISIBLE ? '1' : '0'
      })
      head = (head + 1) % CHUNKS
      animFrame = requestAnimationFrame(() => setTimeout(march, 60))
    }
    march()

    // track real load progress
    let loaded = 0
    let imagesReady = false
    const startTime = Date.now()
    const MIN_MS = 2000

    function onLoad() {
      loaded++
      const pct = loaded / imgs.length
      text.textContent = `Loading... ${Math.round(pct * 100)}%`
      if (loaded >= imgs.length) {
        imagesReady = true
        const elapsed = Date.now() - startTime
        const wait = Math.max(0, MIN_MS - elapsed)
        setTimeout(done, wait)
      }
    }
    imgs.forEach(img => {
      if (img.complete) onLoad()
      else { img.addEventListener('load', onLoad); img.addEventListener('error', onLoad) }
    })

    function done() {
      cancelAnimationFrame(animFrame)
      chunks.forEach(c => c.style.opacity = '1')
      text.textContent = 'Loading... 100%'

      setTimeout(() => {
        // fade out loader
        loader.classList.add('hidden')
        setTimeout(() => loader.remove(), 400)

        // reveal tunnel + logo (logo-b2s appears naturally under the cover)
        gsap.to(document.getElementById('tunnel-cover'), { autoAlpha: 0, duration: 0.7, ease: 'power2.out' })
      }, 300)
    }

    // safety: hide after 6s regardless
    setTimeout(done, 6000)
  </script>

  <script src="/js/back2school.js"></script>

  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
  import { RoomEnvironment } from 'three/examples/jsm/environments/RoomEnvironment.js';

  const canvas = document.getElementById('b2s-three-canvas');
  const sticky = document.getElementById('tunnel-sticky');

  // ── Renderer ──────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping      = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
  camera.position.set(0, 0.3, 9.0);

  function resize() {
    const w = sticky.clientWidth, h = sticky.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Entorno y luces ───────────────────────────────────────────────────────
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
  pmrem.dispose();

  scene.add(new THREE.AmbientLight(0xffffff, 1.5));
  const dir = new THREE.DirectionalLight(0xffffff, 2.5);
  dir.position.set(3, 5, 5);
  scene.add(dir);
  const back = new THREE.DirectionalLight(0xffffff, 0.8);
  back.position.set(-3, -2, -3);
  scene.add(back);

  // ── Cargadores ───────────────────────────────────────────────────────────
  const draco = new DRACOLoader();
  draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const gltfLoader = new GLTFLoader();
  gltfLoader.setDRACOLoader(draco);

  // ── Estado ───────────────────────────────────────────────────────────────
  let boxPivot = null, tapaNode = null, shirtPivot = null;
  let shirtSpinAngle = 0;

  // ── Helpers ──────────────────────────────────────────────────────────────
  function easeOut(t)   { return 1 - Math.pow(1 - Math.min(t, 1), 3); }
  function easeInOut(t) { t = Math.min(t, 1); return t >= 0.5 ? 1 - Math.pow(-2*t+2, 3)/2 : 4*t*t*t; }
  function remap(v, a, b) { return Math.max(0, Math.min(1, (v - a) / (b - a))); }

  function fitToView(obj, size = 2) {
    obj.traverse(c => {
      if (c.isMesh && c.geometry && !c.geometry.attributes.normal)
        c.geometry.computeVertexNormals();
    });
    obj.position.set(0, 0, 0);
    obj.scale.setScalar(1);
    obj.updateMatrixWorld(true);
    const box = new THREE.Box3().setFromObject(obj);
    const s   = box.getSize(new THREE.Vector3());
    const m   = Math.max(s.x, s.y, s.z);
    if (!m) return;
    obj.scale.setScalar(size / m);
    obj.updateMatrixWorld(true);
    const c2 = new THREE.Box3().setFromObject(obj).getCenter(new THREE.Vector3());
    obj.position.sub(c2);
  }

  // ── Carga caja de pizza + camiseta (mismo GLB) ───────────────────────────
  gltfLoader.load('/assets/vamps/pharma/3d/cajapizza3.glb', gltf => {
    const root = gltf.scene;

    // Localizar nodos por nombre
    let shirtNode = null;
    root.traverse(n => {
      if (n.name === 'Object_2') shirtNode = n;
      if (n.name === 'tapa')     tapaNode  = n;
    });
    console.log('[b2s3d] tapa:', tapaNode?.name ?? 'NO', '| shirt:', shirtNode?.name ?? 'NO');

    // Extraer camiseta del árbol de la caja
    if (shirtNode) shirtNode.parent && shirtNode.parent.remove(shirtNode);

    // Escalar ANTES para tener coordenadas reales al calcular el hinge
    fitToView(root, 2.2);
    root.updateMatrixWorld(true);

    // ── Hinge pivot: reparentar tapa con bisagra en el borde correcto ───────
    // tapaNode es hijo directo de root con position=(0,0,0) y sin translation en GLB.
    // Calculamos el borde bisagra en world space y lo convertimos a root-local.
    if (tapaNode) {
      const lb = new THREE.Box3().setFromObject(tapaNode); // world space
      // Bisagra = borde trasero-inferior de la tapa (min.z, min.y)
      const hingeWorld = new THREE.Vector3(
        (lb.min.x + lb.max.x) / 2,
        lb.min.y,
        lb.min.z
      );
      // A root-local: deshace el fitToView (escala uniforme + traslación)
      const s = root.scale.x;
      const hingeLocal = new THREE.Vector3(
        (hingeWorld.x - root.position.x) / s,
        (hingeWorld.y - root.position.y) / s,
        (hingeWorld.z - root.position.z) / s
      );
      // Crear grupo pivot en root-local y mover tapa dentro
      const hinge = new THREE.Group();
      hinge.position.copy(hingeLocal);
      // tapa estaba en (0,0,0) local de root → offset dentro de hinge = -hingeLocal
      tapaNode.position.set(-hingeLocal.x, -hingeLocal.y, -hingeLocal.z);
      root.remove(tapaNode);
      root.add(hinge);
      hinge.add(tapaNode);
      tapaNode = hinge;
      console.log('[b2s3d] hinge local:', hingeLocal.x.toFixed(2), hingeLocal.y.toFixed(2), hingeLocal.z.toFixed(2));
    }

    boxPivot = new THREE.Group();
    boxPivot.add(root);
    boxPivot.visible = false;
    scene.add(boxPivot);

    // Inicializar estado según scroll actual
    const initP = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight);
    updateByScroll(initP);

    // Camiseta
    if (shirtNode) {
      shirtPivot = new THREE.Group();
      shirtPivot.add(shirtNode);
      fitToView(shirtPivot, 1.5);
      shirtPivot.visible = false;
      scene.add(shirtPivot);
    }
  }, undefined, err => console.error('[b2s3d] error caja:', err));

  // ── Rangos de scroll para cada fase ──────────────────────────────────────
  const S_BOX_IN    = [0.75, 0.83];
  const S_BOX_ROT   = [0.80, 0.96];
  const S_LID_OPEN  = [0.84, 0.96];  // tapa se abre durante el giro
  const S_SHIRT_OUT = [0.93, 1.00];

  // ── Actualizar escena según progreso de scroll ────────────────────────────
  function updateByScroll(p) {
    const visible = p >= S_BOX_IN[0];

    // ── Caja ──────────────────────────────────────────────────────────────
    if (boxPivot) {
      boxPivot.visible = visible;
      canvas.style.opacity = visible ? '1' : '0';

      // Scale in
      const scaleP = easeOut(remap(p, ...S_BOX_IN));
      boxPivot.scale.setScalar(scaleP);

      // Rotación 360°
      const rotP = easeInOut(remap(p, ...S_BOX_ROT));
      boxPivot.rotation.y = Math.PI * 2 * rotP;

      // Baja cuando sale la camiseta
      const shirtP = easeOut(remap(p, ...S_SHIRT_OUT));
      boxPivot.position.y = -1.2 * shirtP;
    }

    // ── Tapa ──────────────────────────────────────────────────────────────
    // rotation.x = +PI*0.85 → cerrada (sobre la base)
    // rotation.x = 0        → pose default del GLB (abierta = último frame)
    if (tapaNode) {
      const lidP = easeOut(remap(p, ...S_LID_OPEN));
      tapaNode.rotation.x = Math.PI * 0.47 * (1 - lidP);
    }

    // ── Camiseta ──────────────────────────────────────────────────────────
    if (shirtPivot) {
      const shirtP = easeOut(remap(p, ...S_SHIRT_OUT));
      shirtPivot.visible = shirtP > 0;
      shirtPivot.scale.setScalar(shirtP);
      shirtPivot.position.y = -1.0 + 1.8 * shirtP;
    }
  }

  // ── Loop de render ────────────────────────────────────────────────────────
  // La camiseta sigue girando con rAF cuando está completamente fuera
  let lastRaf = 0;
  function animate(time) {
    requestAnimationFrame(animate);
    const p = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight);
    // Spin continuo de la camiseta solo al final
    if (shirtPivot && p > 0.97) {
      const dt = Math.min((time - lastRaf) / 1000, 0.05);
      shirtSpinAngle += dt * 1.2;
      shirtPivot.rotation.y = shirtSpinAngle;
    }
    lastRaf = time;
    renderer.render(scene, camera);
  }
  requestAnimationFrame(t => { lastRaf = t; animate(t); });

  // ── Scroll handler ────────────────────────────────────────────────────────
  window.addEventListener('scroll', () => {
    const p = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight);
    updateByScroll(p);
  }, { passive: true });
  </script>
</html>
