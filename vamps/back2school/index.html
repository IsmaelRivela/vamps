<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAMPS — Back2School</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #fff;
      touch-action: pan-y;
    }

    /* ── Contenedor alto: define el rango de scroll ── */
    /* 6 imágenes → 7 × 100vh de altura total */
    #tunnel-scroll {
      height: 700vh;
      position: relative;
    }

    /* ── Sticky: se pega al viewport mientras dura el scroll ── */
    #tunnel-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      perspective: 600px;
      perspective-origin: 50% 50%;
    }

    @media (max-width: 768px) {
      #tunnel-sticky { perspective: 380px; }
      .slide img { width: min(92vw, 92vh); height: min(92vw, 92vh); }
    }

    /* ── Escenario 3D: se mueve entero (= cámara avanzando) ── */
    #world {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }
    /* ── Cover blanco que se quita cuando el logo aterriza ── */
    #tunnel-cover {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 1000;
      pointer-events: none;
    }

    /* ── Cada slide: centrada en el escenario ── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      will-change: transform, filter, opacity;
    }

    .slide img {
      width: min(85vw, 85vh);
      height: min(85vw, 85vh);
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ── Logos fijos ── */
    #logo-vamps {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      width: clamp(70px, 8vw, 110px);
      z-index: 999;
      cursor: pointer;
    }
    #logo-b2s {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: clamp(180px, 21vw, 300px);
      z-index: 999;
      display: block;
    }
    /* ── XP Loader ── */
    #xp-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #xp-logo {
      width: clamp(180px, 21vw, 300px);
      display: block;
      margin-bottom: 12px;
    }
    #xp-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #xp-loader-text {
      font-family: 'Trebuchet MS', Tahoma, sans-serif;
      font-size: 13px;
      color: #000;
      letter-spacing: 0.5px;
    }
    #xp-bar-outer {
      width: 220px;
      height: 16px;
      border: 1px solid #7a9fc7;
      background: #000f2b;
      border-radius: 3px;
      overflow: hidden;
      padding: 2px;
    }
    #xp-bar-track {
      display: flex;
      gap: 2px;
      height: 100%;
    }
    .xp-chunk {
      width: 12px;
      height: 100%;
      background: linear-gradient(to bottom, #4fa3e8 0%, #1e5fa8 40%, #2b7ad4 60%, #6ab0f0 100%);
      border-radius: 1px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <a href="/vamps/"><img id="logo-vamps" src="/assets/vamps/back2school/b2s-logovamps.svg" alt="VAMPS" /></a>
  <img id="logo-b2s" src="/assets/vamps/back2school/b2s-logo.png" alt="Back2School" />

  <!-- XP Loader -->
  <div id="xp-loader">
    <img id="xp-logo" src="/assets/vamps/back2school/b2s-logo.png" alt="Back2School" />
    <div id="xp-bar-outer"><div id="xp-bar-track"></div></div>
    <div id="xp-loader-text">Loading...</div>
  </div>

  <div id="tunnel-cover"></div>
  <div id="tunnel-scroll">
    <div id="tunnel-sticky">
      <div id="world">
        <div class="slide"><img src="/assets/vamps/back2school/b2s-6.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-5.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-4.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-3.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-2.webp" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-1.webp" /></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <script>
    // XP loader — animates chunks, hides when all images load
    const loader   = document.getElementById('xp-loader')
    const track    = document.getElementById('xp-bar-track')
    const text     = document.getElementById('xp-loader-text')
    const imgs     = [...document.querySelectorAll('.slide img')]
    const CHUNKS   = 14
    let filled     = 0
    let animFrame

    // build chunks
    for (let i = 0; i < CHUNKS; i++) {
      const c = document.createElement('div')
      c.className = 'xp-chunk'
      c.style.opacity = '0'
      track.appendChild(c)
    }
    const chunks = [...track.querySelectorAll('.xp-chunk')]

    // marching animation — fills from left, loops
    let head = 0
    const VISIBLE = 5
    function march() {
      chunks.forEach((c, i) => {
        const rel = (i - head + CHUNKS) % CHUNKS
        c.style.opacity = rel < VISIBLE ? '1' : '0'
      })
      head = (head + 1) % CHUNKS
      animFrame = requestAnimationFrame(() => setTimeout(march, 60))
    }
    march()

    // track real load progress
    let loaded = 0
    let imagesReady = false
    const startTime = Date.now()
    const MIN_MS = 2000

    function onLoad() {
      loaded++
      const pct = loaded / imgs.length
      text.textContent = `Loading... ${Math.round(pct * 100)}%`
      if (loaded >= imgs.length) {
        imagesReady = true
        const elapsed = Date.now() - startTime
        const wait = Math.max(0, MIN_MS - elapsed)
        setTimeout(done, wait)
      }
    }
    imgs.forEach(img => {
      if (img.complete) onLoad()
      else { img.addEventListener('load', onLoad); img.addEventListener('error', onLoad) }
    })

    function done() {
      cancelAnimationFrame(animFrame)
      chunks.forEach(c => c.style.opacity = '1')
      text.textContent = 'Loading... 100%'

      setTimeout(() => {
        // fade out loader
        loader.classList.add('hidden')
        setTimeout(() => loader.remove(), 400)

        // reveal tunnel + logo (logo-b2s appears naturally under the cover)
        gsap.to(document.getElementById('tunnel-cover'), { autoAlpha: 0, duration: 0.7, ease: 'power2.out' })
      }, 300)
    }

    // safety: hide after 6s regardless
    setTimeout(done, 6000)
  </script>

  <script src="/js/back2school.js"></script>
</body>
</html>
