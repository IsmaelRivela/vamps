<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAMPS — Back2School</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #fff;
      touch-action: pan-y;
    }

    /* ── Contenedor alto: define el rango de scroll ── */
    /* 6 imágenes → 7 × 100vh de altura total */
    #tunnel-scroll {
      height: 700vh;
      position: relative;
    }

    /* ── Sticky: se pega al viewport mientras dura el scroll ── */
    #tunnel-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      perspective: 600px;
      perspective-origin: 50% 50%;
    }

    @media (max-width: 768px) {
      #tunnel-sticky { perspective: 380px; }
      .slide img { width: min(92vw, 92vh); height: min(92vw, 92vh); }
    }

    /* ── Escenario 3D: se mueve entero (= cámara avanzando) ── */
    #world {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }

    /* ── Cada slide: centrada en el escenario ── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      will-change: transform, filter, opacity;
    }

    .slide img {
      width: min(85vw, 85vh);
      height: min(85vw, 85vh);
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ── Logos fijos ── */
    #logo-vamps {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      width: clamp(70px, 8vw, 110px);
      z-index: 999;
      cursor: pointer;
    }
    #logo-b2s {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: clamp(180px, 21vw, 300px);
      z-index: 999;
      display: block;
    }
  </style>
</head>
<body>

  <a href="/vamps/"><img id="logo-vamps" src="/assets/vamps/back2school/b2s-logovamps.svg" alt="VAMPS" /></a>
  <img id="logo-b2s" src="/assets/vamps/back2school/b2s-logo.png" alt="Back2School" />

  <div id="tunnel-scroll">
    <div id="tunnel-sticky">
      <div id="world">
        <div class="slide"><img src="/assets/vamps/back2school/b2s-6.png" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-5.png" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-4.png" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-3.png" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-2.png" /></div>
        <div class="slide"><img src="/assets/vamps/back2school/b2s-1.png" /></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="/js/back2school.js"></script>
</body>
</html>
