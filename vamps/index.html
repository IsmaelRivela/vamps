<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="levamps" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta charset="UTF-8" />
  <!-- <script>document.documentElement.lang=localStorage.getItem('site-lang')||'en'</script> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAMPS — Concept Page</title>
  <meta name="description" content="VAMPS" />

  <link rel="stylesheet" href="/css/globals.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/vamps.css" />
</head>
<body class="theme-vamps">

  <div class="page-transition"></div>

  <nav class="nav">
    <a href="/" class="nav__logo">Home</a>
    <div class="nav__links">
      <a href="/vamps/" class="nav__link">VAMPS</a>
      <a href="/ismael/" class="nav__link">Work</a>
      <!-- <button class="nav__lang" id="langToggle">ES</button> -->
    </div>
  </nav>

  <!-- 8-column grid page -->
  <main class="vamps-page">

    <!-- Hero — pinned SVG title filled with image -->
    <section class="vamps-hero vamps-page__full">
      <div class="vamps-hero__img" aria-label="VAMPS"></div>
    </section>

    <!-- Slot row — transparent, over pinned hero -->
    <section class="vamps-page__slot">
      <div class="slot">
        <img class="slot__frame" src="/assets/vamps/jackpot.png" alt="" loading="lazy" />
        <div class="slot__reel slot__reel--0" id="reel0"><div class="slot__strip"></div></div>
        <div class="slot__reel slot__reel--1" id="reel1"><div class="slot__strip"></div></div>
        <div class="slot__reel slot__reel--2" id="reel2"><div class="slot__strip"></div></div>
      </div>
      <div class="slot__controls">
        <div class="slot__credits">
          <div>Credits: <span id="credits">100</span></div>
          <div>Bet: <span>10</span></div>
        </div>
        <button class="slot__btn" id="spin">
          <span class="slot__btn-label">Insert Coin</span>
          <img class="slot__btn-coin" src="/assets/vamps/coinvamp-pix.png" alt="Insert coin" loading="lazy" />
        </button>
        <div class="slot__msg" id="msg"></div>
      </div>
    </section>

    <div class="vamps-page__bigtext vamps-page__bigtext--right">
      <span>GAMBLE</span>
      <span>TO</span>
      <span>EXPLORE</span>
    </div>

    <!-- Content wrapper — scrolls over hero, black bg -->
    <div class="vamps-content vamps-page__full">

    <!-- Huge word — full width -->
    <div class="vamps-page__huge vamps-page__full">
      <span lang="en">COLLECTIONS</span>
      <span lang="es">COLECCIONES</span>
    </div>

    <!-- Image — cols 6-8 right -->
    <div class="vamps-page__img vamps-page__img--right-sm vamps-page__img--transparent">
      <img src="/assets/vamps/pharma/vamps-image-asset-pharma1.png" alt="" loading="lazy" />
    </div>

    <!-- Huge word right -->
    <a href="/vamps/pharma/" id="pharma-link" class="vamps-page__huge vamps-page__huge--right vamps-page__huge--link">
      <span>VAMPS PHARMA</span>
    </a>

    <!-- Image pharma2 — right with glow -->
    <div class="vamps-page__img vamps-page__img--right-sm vamps-page__img--flicker vamps-page__img--transparent">
      <img src="/assets/vamps/pharma/vamps-image-asset-pharma2.png" alt="" loading="lazy" />
    </div>

    <!-- Image — cols 3-6 center -->
    <div class="vamps-page__img vamps-page__img--center">
      <img src="/assets/vamps/back2school/vamps-image-asset-back2school5.jpg" alt="" loading="lazy" />
    </div>

    <!-- Big text left -->
    <div class="vamps-page__bigtext vamps-page__bigtext--left">
      <span>STUFF</span>
      <span>STUFF</span>
      <span>STUFF</span>
      <span>STUFF</span>
      <span>STUFF</span>
    </div>

    <!-- Red band — image + text full width -->
    <div class="vamps-page__band vamps-page__full">
      <div class="vamps-page__img vamps-page__img--left-wide">
        <img src="/assets/vamps/back2school/vamps-image-asset-back2school7.jpg" alt="" loading="lazy" />
      </div>
    </div>

    <!-- Huge word — full -->
    <a href="/vamps/back2school/" id="school-link" class="vamps-page__huge vamps-page__full vamps-page__huge--link">
      <span>BACK2SCHOOL</span>
    </a>

    <!-- Draggable stickers -->
    <img class="sticker" src="/assets/vamps/sticker1.svg" alt="" loading="lazy" style="top: 45%; left: 70%; transform: rotate(-25deg);" />
    <img class="sticker" src="/assets/vamps/sticker2.svg" alt="" loading="lazy" style="top: 50%; left: 8%; transform: rotate(25deg);" />
    <img class="sticker" src="/assets/vamps/sticker3.svg" alt="" loading="lazy" style="top: 80%; left: 65%;" />

    <!-- /Content wrapper -->
    </div>

    <!-- Footer — full width -->
    <footer class="vamps-footer vamps-page__full">
      <a href="/" class="vamps-footer__back">← Back to home</a>
      <span class="vamps-footer__brand">VAMPS © 2026</span>
    </footer>

  </main>

  <script type="module" src="/js/vamps-app.js"></script>
</body>
</html>
